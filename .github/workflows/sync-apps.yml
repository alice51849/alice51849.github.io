name: Sync App Store apps

# Daily check: adds any newly-published app to the site automatically.
on:
  schedule:
    - cron: '0 18 * * *'   # ~02:00 Taipei time every day
  workflow_dispatch: {}     # allow manual "Run workflow"

permissions:
  contents: write

concurrency:
  group: sync-apps
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync newly published apps into data.js
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: node scripts/sync-apps.mjs

      - name: Verify deterministic root app conversion sync
        if: always()
        run: python3 .github/scripts/test_sync_root_app_pages.py -q

      - name: Sync verified app pages, storefront links, and Smart App Banners
        if: always()
        run: python3 scripts/sync_root_app_pages.py

      - name: Commit & push if anything changed
        id: publish
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name  "lumi-sync-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: auto-sync app(s) + SEO landing pages [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Pushed."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes - already up to date."
          fi

      - name: Submit the published sitemap to IndexNow
        if: steps.publish.outputs.changed == 'true' || github.run_attempt > 1 || github.event_name == 'workflow_dispatch'
        run: python3 scripts/indexnow.py
