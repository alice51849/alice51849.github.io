name: Sync App Store apps

# Daily check: adds any newly-published app to the site automatically.
on:
  schedule:
    - cron: '0 18 * * *'   # ~02:00 Taipei time every day
  workflow_dispatch: {}     # allow manual "Run workflow"

permissions:
  contents: write

concurrency:
  group: sync-apps
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync newly published apps into data.js
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: node scripts/sync-apps.mjs

      - name: Generate SEO landing pages (all languages) for any app missing one
        if: always()
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          APPS_SOURCE: datajs
        run: python3 gen_app_pages.py --all --langs all

      - name: Commit & push if anything changed
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name  "lumi-sync-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: auto-sync app(s) + SEO landing pages [skip ci]"
            git push
            python3 scripts/indexnow.py || true
            echo "Pushed."
          else
            echo "No changes - already up to date."
          fi
