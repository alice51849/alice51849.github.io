name: Sync API and agent discovery catalogs

on:
  schedule:
    - cron: "17 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-discovery-catalogs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Verify the RFC 9727 and ARD sync contracts
        run: python3 .github/scripts/test_sync_api_catalog.py -q
      - name: Sync the generated discovery catalogs
        run: python3 .github/scripts/sync_api_catalog.py
      - name: Persist discovery catalog changes
        run: |
          if git diff --quiet -- \
            .well-known/api-catalog \
            .well-known/ai-catalog.json \
            .well-known/lumi-app-finder.mcp.json; then
            echo "Discovery catalogs are already current."
            exit 0
          fi
          git config user.name "lumi-api-catalog-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .well-known/api-catalog \
            .well-known/ai-catalog.json \
            .well-known/lumi-app-finder.mcp.json
          git commit -m "chore: sync API and agent discovery catalogs"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            if [[ "$attempt" -lt 3 ]]; then
              sleep $((attempt * 10))
            fi
          done
          exit 1
