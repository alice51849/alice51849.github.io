<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lumi Studio — 做一束剛剛好的光</title>
<meta name="description" content="Lumi Studio is an independent studio crafting warm, trustworthy apps for children and families. Privacy-first, no ads, pay once.">
<meta property="og:title" content="Lumi Studio">
<meta property="og:description" content="做一束剛剛好的光。為孩子與家庭打造溫暖、值得信任的 app。">
<meta property="og:type" content="website">
<meta name="theme-color" content="#FCF7EF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+KR:wght@400;700&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FCF7EF; --bg2:#F6ECDC; --card:#FFFFFF; --card2:#FFFBF4;
  --ink:#2E2620; --ink-soft:#6E5D4C; --ink-mute:#9A8975;
  --gold:#C98A3C; --gold-2:#E6B567; --gold-deep:#A86E28;
  --coral:#E0876A; --rose:#E9A98C; --cream:#FFF4E2;
  --line:rgba(120,90,50,.13); --line-2:rgba(120,90,50,.08);
  --shadow:0 18px 50px -22px rgba(150,100,40,.45);
  --shadow-soft:0 8px 26px -14px rgba(150,100,40,.32);
  --radius:26px; --radius-lg:34px;
  --serif:'Fraunces','Noto Serif TC',Georgia,serif;
  --sans:'Plus Jakarta Sans','Noto Sans TC','Noto Sans JP','Noto Sans KR',system-ui,sans-serif;
}
html[lang="ja"]{ --sans:'Plus Jakarta Sans','Noto Sans JP','Noto Sans TC',system-ui,sans-serif; }
html[lang="ko"]{ --sans:'Plus Jakarta Sans','Noto Sans KR','Noto Sans TC',system-ui,sans-serif; }
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);color:var(--ink);background:var(--bg);
  line-height:1.7;letter-spacing:.005em;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
}
::selection{background:var(--gold-2);color:#fff}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
.wrap{width:min(1180px,92vw);margin-inline:auto}
.serif{font-family:var(--serif)}
.eyebrow{font:600 .82rem/1 var(--sans);letter-spacing:.24em;text-transform:uppercase;color:var(--gold-deep)}

/* ---------- Header ---------- */
header{position:fixed;inset:0 0 auto 0;z-index:50;transition:.4s}
.nav{display:flex;align-items:center;justify-content:space-between;gap:1rem;
  padding:.9rem 0;}
.navbar{position:relative;}
header.scrolled .navbar::before{
  content:"";position:absolute;inset:0;background:rgba(252,247,239,.78);
  backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  border-bottom:1px solid var(--line-2);box-shadow:0 6px 24px -18px rgba(150,100,40,.5);
}
.navbar>.wrap{position:relative}
.brand{display:flex;align-items:center;gap:.6rem;font-family:var(--serif);
  font-weight:900;font-size:1.32rem;color:var(--ink);letter-spacing:-.01em}
.brand .spark{width:26px;height:26px;flex:none}
.menu{display:flex;align-items:center;gap:.4rem}
.menu a{padding:.5rem .9rem;border-radius:99px;font-weight:600;font-size:.95rem;
  color:var(--ink-soft);transition:.25s}
.menu a:hover{color:var(--ink);background:rgba(201,138,60,.1)}
.langbtn{position:relative}
.langbtn>button{display:flex;align-items:center;gap:.45rem;border:1px solid var(--line);
  background:var(--card2);color:var(--ink);padding:.5rem .85rem;border-radius:99px;
  font-family:var(--sans);font-weight:600;font-size:.9rem;cursor:pointer;transition:.25s}
.langbtn>button:hover{border-color:var(--gold-2);box-shadow:var(--shadow-soft)}
.langbtn svg{width:16px;height:16px;opacity:.75}
.langmenu{position:absolute;right:0;top:calc(100% + .5rem);background:var(--card);
  border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
  padding:.4rem;min-width:148px;opacity:0;visibility:hidden;transform:translateY(-6px);transition:.22s}
.langmenu.open{opacity:1;visibility:visible;transform:none}
.langmenu button{display:flex;width:100%;align-items:center;justify-content:space-between;
  gap:.5rem;background:none;border:0;padding:.6rem .75rem;border-radius:12px;cursor:pointer;
  font-family:var(--sans);font-size:.92rem;color:var(--ink);transition:.18s}
.langmenu button:hover{background:rgba(201,138,60,.12)}
.langmenu button.active{color:var(--gold-deep);font-weight:700}
.langmenu button .tick{opacity:0}
.langmenu button.active .tick{opacity:1}
.burger{display:none;border:1px solid var(--line);background:var(--card2);border-radius:12px;
  width:42px;height:42px;cursor:pointer}

/* ---------- Hero ---------- */
.hero{position:relative;padding:11rem 0 6rem;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:-2;background:
  radial-gradient(60% 50% at 18% 12%,rgba(230,181,103,.55),transparent 60%),
  radial-gradient(55% 55% at 88% 8%,rgba(224,135,106,.42),transparent 62%),
  radial-gradient(70% 60% at 70% 95%,rgba(255,221,170,.55),transparent 60%),
  linear-gradient(180deg,#FFF7EA,#FCF7EF 60%)}
.blob{position:absolute;border-radius:50%;filter:blur(46px);opacity:.55;z-index:-1;animation:float 14s ease-in-out infinite}
.blob.b1{width:340px;height:340px;left:-60px;top:60px;background:radial-gradient(circle,#F4C572,transparent 70%)}
.blob.b2{width:300px;height:300px;right:-40px;top:30px;background:radial-gradient(circle,#EE9F84,transparent 70%);animation-delay:-4s}
.blob.b3{width:260px;height:260px;left:46%;bottom:-60px;background:radial-gradient(circle,#FFD9A0,transparent 70%);animation-delay:-8s}
@keyframes float{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-26px) translateX(16px)}}
.hero-inner{max-width:880px}
.hero .eyebrow{opacity:0;animation:rise .8s .05s forwards}
.hero h1{font-family:var(--serif);font-weight:900;letter-spacing:-.025em;line-height:1.04;
  font-size:clamp(2.7rem,7vw,5.2rem);margin:.5rem 0 .1rem;
  background:linear-gradient(180deg,#3a2c1d,#7a5326 120%);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero h1 em{font-style:italic;font-weight:500;color:var(--gold-deep);-webkit-text-fill-color:var(--gold-deep)}
.hero .lead{font-size:clamp(1.05rem,2.2vw,1.32rem);color:var(--ink-soft);max-width:620px;margin:1.3rem 0 2.2rem}
.hero h1,.hero .lead,.hero .cta-row,.hero .stats{opacity:0;animation:rise .9s forwards}
.hero h1{animation-delay:.12s}.hero .lead{animation-delay:.24s}
.hero .cta-row{animation-delay:.36s}.hero .stats{animation-delay:.5s}
@keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
.cta-row{display:flex;flex-wrap:wrap;gap:.85rem}
.btn{display:inline-flex;align-items:center;gap:.55rem;font-weight:700;font-size:1rem;
  padding:.95rem 1.7rem;border-radius:99px;cursor:pointer;transition:.28s;border:1px solid transparent}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--coral));color:#fff;
  box-shadow:0 14px 30px -12px rgba(201,120,60,.7)}
.btn.primary:hover{transform:translateY(-3px);box-shadow:0 20px 40px -12px rgba(201,120,60,.8)}
.btn.ghost{background:var(--card2);color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{border-color:var(--gold-2);transform:translateY(-3px);box-shadow:var(--shadow-soft)}
.stats{display:flex;flex-wrap:wrap;gap:2.6rem;margin-top:3.2rem}
.stat .n{font-family:var(--serif);font-weight:900;font-size:2.3rem;color:var(--ink);line-height:1}
.stat .l{font-size:.85rem;color:var(--ink-mute);margin-top:.3rem;font-weight:600;letter-spacing:.02em}

/* ---------- Sections ---------- */
section{padding:6rem 0;position:relative}
.sec-head{max-width:680px;margin-bottom:3rem}
.sec-head.center{margin-inline:auto;text-align:center}
.sec-head h2{font-family:var(--serif);font-weight:900;letter-spacing:-.02em;line-height:1.1;
  font-size:clamp(2rem,4.6vw,3.2rem);margin:.7rem 0 .6rem;color:var(--ink)}
.sec-head p{color:var(--ink-soft);font-size:1.08rem}

/* About */
.about{background:
  radial-gradient(80% 120% at 50% -10%,rgba(255,238,205,.7),transparent 60%);}
.story{max-width:760px;margin-inline:auto;text-align:center}
.story .lead{font-family:var(--serif);font-style:italic;font-weight:500;
  font-size:clamp(1.5rem,3.4vw,2.2rem);color:var(--gold-deep);line-height:1.4;margin-bottom:1.6rem}
.story p{color:var(--ink-soft);font-size:1.1rem;margin:1.1rem 0}
.story p strong{color:var(--ink);font-weight:700}
.halo{width:70px;height:70px;margin:0 auto 1.4rem}

/* App grid */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.appcard{position:relative;background:var(--card);border:1px solid var(--line-2);
  border-radius:var(--radius);padding:1.6rem;display:flex;flex-direction:column;gap:1rem;
  box-shadow:var(--shadow-soft);transition:.35s cubic-bezier(.2,.7,.2,1);overflow:hidden}
.appcard::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(135deg,rgba(255,221,170,.0),rgba(255,221,170,.18));opacity:0;transition:.35s}
.appcard:hover{transform:translateY(-8px);box-shadow:var(--shadow);border-color:rgba(201,138,60,.28)}
.appcard:hover::after{opacity:1}
.appcard .top{display:flex;align-items:center;gap:1rem}
.appcard .ic{width:74px;height:74px;border-radius:19px;flex:none;
  box-shadow:0 10px 22px -10px rgba(120,80,30,.5);background:#fff;object-fit:cover}
.appcard h3{font-weight:700;font-size:1.12rem;line-height:1.25;color:var(--ink);letter-spacing:-.01em}
.appcard .sub{font-size:.9rem;color:var(--gold-deep);font-weight:600;margin-top:.2rem}
.appcard .blurb{font-size:.96rem;color:var(--ink-soft);flex:1}
.badge{position:absolute;top:1.2rem;right:1.2rem;font-size:.7rem;font-weight:700;letter-spacing:.06em;
  padding:.28rem .6rem;border-radius:99px;background:rgba(201,138,60,.14);color:var(--gold-deep)}
.badge.lite{background:rgba(224,135,106,.16);color:#b85e42}
.applink{display:inline-flex;align-items:center;gap:.45rem;font-weight:700;font-size:.92rem;
  color:var(--ink);padding:.6rem 0;width:fit-content;transition:.25s}
.applink svg{width:18px;height:18px;transition:.25s}
.applink:hover{color:var(--gold-deep)}
.applink:hover svg{transform:translateX(4px)}

/* Values */
.values{background:linear-gradient(180deg,#FFF7EA,#FBF1E1)}
.vgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.3rem}
.vcard{background:var(--card2);border:1px solid var(--line-2);border-radius:var(--radius);
  padding:1.8rem;transition:.3s}
.vcard:hover{transform:translateY(-6px);box-shadow:var(--shadow-soft);background:#fff}
.vcard .vi{width:50px;height:50px;display:grid;place-items:center;border-radius:15px;
  background:linear-gradient(135deg,var(--gold-2),var(--coral));margin-bottom:1rem;
  box-shadow:0 10px 20px -10px rgba(201,120,60,.7)}
.vcard .vi svg{width:26px;height:26px;stroke:#fff}
.vcard h4{font-size:1.12rem;font-weight:700;margin-bottom:.4rem;color:var(--ink)}
.vcard p{font-size:.96rem;color:var(--ink-soft)}

/* CTA band */
.band{margin:2rem 0 0}
.band-in{background:linear-gradient(135deg,#3a2c1d,#7a5326);border-radius:var(--radius-lg);
  padding:clamp(2.4rem,5vw,3.6rem);text-align:center;color:#fff;position:relative;overflow:hidden}
.band-in::before{content:"";position:absolute;inset:0;background:
  radial-gradient(50% 80% at 20% 0%,rgba(230,181,103,.5),transparent 60%),
  radial-gradient(50% 80% at 90% 100%,rgba(224,135,106,.5),transparent 60%)}
.band-in>*{position:relative}
.band-in h2{font-family:var(--serif);font-weight:900;font-size:clamp(1.8rem,4vw,2.6rem);margin-bottom:.6rem}
.band-in p{color:rgba(255,245,230,.85);max-width:520px;margin:0 auto 1.6rem}
.band-in .btn.primary{background:#fff;color:var(--gold-deep)}

/* Footer */
footer{padding:4rem 0 2.5rem;border-top:1px solid var(--line);background:var(--bg2)}
.foot{display:flex;flex-wrap:wrap;justify-content:space-between;gap:2rem;align-items:flex-start}
.foot .brand{font-size:1.4rem}
.foot p{color:var(--ink-soft);font-size:.95rem;max-width:340px;margin-top:.8rem}
.foot .cols{display:flex;gap:3.5rem;flex-wrap:wrap}
.fcol h5{font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:.9rem}
.fcol a{display:block;color:var(--ink-soft);font-size:.95rem;padding:.25rem 0;transition:.2s}
.fcol a:hover{color:var(--gold-deep)}
.copy{margin-top:3rem;padding-top:1.6rem;border-top:1px solid var(--line);
  display:flex;flex-wrap:wrap;justify-content:space-between;gap:.6rem;color:var(--ink-mute);font-size:.88rem}

/* reveal */
.reveal{opacity:0;transform:translateY(28px);transition:.8s cubic-bezier(.2,.7,.2,1)}
.reveal.in{opacity:1;transform:none}
.stagger>*{opacity:0;transform:translateY(28px);transition:.7s cubic-bezier(.2,.7,.2,1)}
.stagger.in>*{opacity:1;transform:none}

@media(max-width:900px){
  .grid,.vgrid{grid-template-columns:repeat(2,1fr)}
  .menu .navlink{display:none}
}
@media(max-width:620px){
  .grid,.vgrid{grid-template-columns:1fr}
  .hero{padding-top:9rem}
  .stats{gap:1.6rem}
  .stat .n{font-size:1.9rem}
  .burger{display:block}
  .foot .cols{gap:2rem}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.reveal,.stagger>*{opacity:1;transform:none}}
</style>
</head>

const LANGS=["zh","en","ja","ko"];
const HTMLLANG={zh:"zh-Hant",en:"en",ja:"ja",ko:"ko"};
const ARROW='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';

function detect(){
  const s=localStorage.getItem("lumi-lang");
  if(s&&I18N[s])return s;
  const n=(navigator.language||"en").toLowerCase();
  if(n.startsWith("zh"))return "zh";
  if(n.startsWith("ja"))return "ja";
  if(n.startsWith("ko"))return "ko";
  return "en";
}
let lang=detect();

function vicon(i){
  const ic=['<path d="M12 2 4 5v6c0 5 3.4 8 8 9 4.6-1 8-4 8-9V5l-8-3Z"/>','<circle cx="12" cy="12" r="9"/><path d="m8 12 3 3 5-6"/>','<circle cx="12" cy="12" r="9"/><path d="M2 12h20M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/>','<path d="M7 11V8a5 5 0 0 1 10 0v3"/><rect x="5" y="11" width="14" height="9" rx="2"/>','<path d="M12 3 3 7v5c0 5 4 8 9 9 5-1 9-4 9-9V7l-9-4Z"/><path d="m9 12 2 2 4-4"/>','<path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 5.5-7 10-7 10Z"/>'];
  return '<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+ic[i%ic.length]+'</svg>';
}
function appCard(a){
  const t=I18N[lang];
  const el=document.createElement("a");
  el.className="appcard";el.href=a.url;el.target="_blank";el.rel="noopener";
  const badge=a.badge?`<span class="badge ${a.badge==='Lite'?'lite':''}">${a.badge}</span>`:"";
  el.innerHTML=`${badge}
    <div class="top">
      <img class="ic" src="${a.icon}" alt="" loading="lazy" width="74" height="74">
      <div><h3></h3><div class="sub"></div></div>
    </div>
    <p class="blurb"></p>
    <span class="applink">${t.app_cta} ${ARROW}</span>`;
  el.querySelector("h3").textContent=a.name[lang];
  el.querySelector(".sub").textContent=a.sub[lang];
  el.querySelector(".blurb").textContent=a.blurb[lang];
  return el;
}
function render(){
  const t=I18N[lang];
  document.documentElement.lang=HTMLLANG[lang];
  document.querySelectorAll("[data-i]").forEach(e=>{
    const k=e.getAttribute("data-i");
    if(t[k]!=null) e.innerHTML=t[k];
  });
  // stats
  const st=document.getElementById("stats");st.innerHTML="";
  t.stats.forEach(([n,l])=>{const d=document.createElement("div");d.className="stat";
    d.innerHTML=`<div class="n">${n}</div><div class="l">${l}</div>`;st.appendChild(d);});
  // story
  const sb=document.getElementById("storyBody");sb.innerHTML="";
  t.story.forEach(p=>{const el=document.createElement("p");el.innerHTML=p;sb.appendChild(el);});
  // apps
  const gk=document.getElementById("gridKids"),gt=document.getElementById("gridTools");
  gk.innerHTML="";gt.innerHTML="";
  window.APPS.forEach(a=>{(a.cat==="kids"?gk:gt).appendChild(appCard(a));});
  // values
  const vg=document.getElementById("vgrid");vg.innerHTML="";
  t.values.forEach(([h,p],i)=>{const d=document.createElement("div");d.className="vcard";
    d.innerHTML=`<div class="vi">${vicon(i)}</div><h4></h4><p></p>`;
    d.querySelector("h4").textContent=h;d.querySelector("p").textContent=p;vg.appendChild(d);});
  // lang menu
  document.getElementById("langCur").textContent=I18N[lang]._name;
  const lm=document.getElementById("langMenu");lm.innerHTML="";
  LANGS.forEach(l=>{const b=document.createElement("button");
    b.className=l===lang?"active":"";
    b.innerHTML=`<span>${I18N[l]._name}</span><span class="tick">✓</span>`;
    b.onclick=()=>{lang=l;localStorage.setItem("lumi-lang",l);lm.classList.remove("open");render();observe();};
    lm.appendChild(b);});
  document.title = (lang==="en")?"Lumi Studio — Light, made just right":
                   (lang==="ja")?"Lumi Studio — ちょうどいい光を":
                   (lang==="ko")?"Lumi Studio — 꼭 알맞은 빛을":
                   "Lumi Studio — 做一束剛剛好的光";
}
// reveal on scroll
let io;
function observe(){
  if(io)io.disconnect();
  io=new IntersectionObserver((es)=>{es.forEach((e,i)=>{if(e.isIntersecting){
    const el=e.target;
    if(el.classList.contains("stagger")){[...el.children].forEach((c,j)=>{c.style.transitionDelay=(j*70)+"ms";});}
    el.classList.add("in");io.unobserve(el);
  }});},{threshold:.12});
  document.querySelectorAll(".reveal,.stagger").forEach(e=>io.observe(e));
}
// header + lang interactions
addEventListener("scroll",()=>{document.getElementById("hd").classList.toggle("scrolled",scrollY>20);});
document.getElementById("langToggle").onclick=(e)=>{e.stopPropagation();document.getElementById("langMenu").classList.toggle("open");};
addEventListener("click",()=>document.getElementById("langMenu").classList.remove("open"));

render();observe();
document.getElementById("hd").classList.toggle("scrolled",scrollY>20);
</script>
